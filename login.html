<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | PIDI Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root {
            --bg-body: #050505;
            --bg-card: #111111;
            --border-dash: #222222;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --nav-bg: #111111;
            --btn-secondary: #222222;
        }
        body.light-mode {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-dash: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --nav-bg: #edf2f7;
            --btn-secondary: #e2e8f0;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-primary); transition: background-color 0.3s ease, color 0.3s ease; max-width: 100vw; overflow-x: hidden; }
        .bento-card { background: var(--bg-card); border: 1px solid var(--border-dash); border-radius: 24px; padding: 2rem; transition: all 0.3s ease; }
        .accent-gradient { background: linear-gradient(135deg, #6a26da 0%, #a366ff 100%); color: white !important; }
        .text-dash-secondary { color: var(--text-secondary) !important; }
        .bg-dash-secondary { background-color: var(--btn-secondary); }
        .border-dash { border-color: var(--border-dash) !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 gap-4">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <img id="logo-img" src="assets/pidiblack.png" alt="PIDI Logo" class="h-12 w-auto">
            <h1 class="text-2xl font-bold tracking-tight">PIDI Tasks</h1>
        </a>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-dash-secondary border border-dash flex items-center justify-center hover:border-[#6a26da] transition" id="theme-toggle">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-12 md:mt-24" id="login-main">
        <div class="bento-card">
            <div id="login-message" class="hidden p-3 rounded-xl text-sm mb-4 text-center"></div>
            <div class="mb-10">
                <h2 class="text-3xl font-bold tracking-tight">Welcome back</h2>
                <p class="text-dash-secondary mt-2">Access your workspace.</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label for="login-email" class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Email Address</label>
                    <input type="email" id="login-email" placeholder="name@company.com" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3.5 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5 px-1">
                        <label for="login-password" class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest">Password</label>
                        <a href="#" class="text-[10px] uppercase font-bold text-[#6a26da] tracking-widest">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3.5 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>

                <button type="submit" class="w-full accent-gradient py-4 rounded-2xl font-bold text-sm shadow-lg hover:scale-[1.02] transition active:scale-[0.98] mt-4">
                    Log In to Console
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-dash text-center">
                <p class="text-sm text-dash-secondary">
                    New to PIDI? 
                    <a href="signup.html" class="text-[var(--text-primary)] font-bold hover:text-[#6a26da] transition ml-1">Create an account</a>
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert(error.message);
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        // Theme toggle and logo update functions (kept for consistency with dashboard/signup)
        const toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
            updateLogo();
        }
        
        const updateLogo = () => {
            const logo = document.getElementById('logo-img');
            if (!logo) return;
            logo.src = document.body.classList.contains('light-mode') ? 'assets/pidi.png' : 'assets/pidiblack.png';
        }
        
        const updateThemeIcon = () => {
            const icon = document.querySelector('#theme-icon');
            icon.classList.toggle('fa-moon', !document.body.classList.contains('light-mode'));
            icon.classList.toggle('fa-sun', document.body.classList.contains('light-mode'));
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            updateThemeIcon();
            updateLogo();
        }
        
        // Expose handleLogin to the global scope for onsubmit
        window.handleLogin = handleLogin;
        window.toggleTheme = toggleTheme;
    </script>
</body>
</html>
