<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | PIDI Console</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        :root {
            --bg-body: #050505;
            --bg-card: #111111;
            --border-dash: #222222;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --nav-bg: #111111;
            --btn-secondary: #222222;
        }

        body.light-mode {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-dash: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --nav-bg: #edf2f7;
            --btn-secondary: #e2e8f0;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-primary); 
            transition: background-color 0.3s ease, color 0.3s ease;
            max-width: 100vw;
            overflow-x: hidden;
        }
        
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto;
            gap: 1.5rem;
        }

        .bento-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dash);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            min-width: 0; /* Prevents grid blowout */
            overflow: hidden;
            word-wrap: break-word;
        }

        .bento-card:hover { border-color: #6a26da; }

        /* Responsive Adjustments */
        @media (max-width: 1024px) { /* Tablet */
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) { /* Mobile */
            body { padding: 1rem; }
            .bento-grid { grid-template-columns: 1fr; }
            .col-span-2, .col-span-3, .row-span-2 { grid-column: span 1 !important; grid-row: span 1 !important; }
            
            /* Shrink large text to fit mobile cards */
            #main-value { font-size: clamp(2.5rem, 12vw, 4rem); }
            #main-stat-label { font-size: 1.75rem; }
            
            header { text-align: left; align-items: flex-start; }
            header .text-right { text-align: left; }
        }

        .accent-gradient { 
            background: linear-gradient(135deg, #6a26da 0%, #a366ff 100%); 
            color: white !important; 
        }
        .nav-container { background-color: var(--nav-bg); border-color: var(--border-dash); }
        .border-dash { border-color: var(--border-dash) !important; }
        .text-dash-secondary { color: var(--text-secondary) !important; }
        .bg-dash-secondary { background-color: var(--btn-secondary); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-12 gap-4">
        <a href="dashboard.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <img src="assets/pidi.png" alt="PIDI Logo" class="h-12 w-auto">
                <span class="text-xl font-bold">PIDI Tasks</span>
        </a>

        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-dash-secondary border border-dash flex items-center justify-center hover:border-[#6a26da] transition" id="theme-toggle">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto">
        <div class="bento-card">
            <div class="mb-8">
                <h2 class="text-3xl font-bold tracking-tight">Create your account</h2>
                <p class="text-dash-secondary mt-2">Join the future of performance marketing.</p>
            </div>

            <form onsubmit="handleSignup(event)" class="space-y-5">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Full Name</label>
                    <input type="text" placeholder="Prince Dike" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Email Address</label>
                    <input type="email" placeholder="name@company.com" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>

                <div>
                    <label class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Password</label>
                    <input type="password" placeholder="••••••••" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>

                <div>
                    <label class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1 text-center">I want to...</label>
                    <div class="nav-container p-1 rounded-2xl border flex gap-1 mt-2">
                        <button type="button" onclick="selectRole('creator')" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition active-role" id="role-creator">Launch Campaigns</button>
                        <button type="button" onclick="selectRole('performer')" class="flex-1 py-2.5 rounded-xl text-xs font-bold text-dash-secondary transition" id="role-performer">Earn by Engaging</button>
                    </div>
                    <input type="hidden" id="selected-role" value="creator">
                </div>

                <button type="submit" class="w-full accent-gradient py-4 rounded-2xl font-bold text-sm shadow-lg hover:scale-[1.02] transition active:scale-[0.98] mt-4">
                    Create Console Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-dash text-center">
                <p class="text-sm text-dash-secondary">
                    Already have an account? 
                    <a href="login.html" class="text-[var(--text-primary)] font-bold hover:text-[#6a26da] transition ml-1">Log in here</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        function selectRole(role) {
            document.getElementById('role-creator').classList.toggle('active-role', role === 'creator');
            document.getElementById('role-creator').classList.toggle('bg-white', role === 'creator');
            document.getElementById('role-creator').classList.toggle('text-black', role === 'creator');
            document.getElementById('role-creator').classList.toggle('text-dash-secondary', role !== 'creator');

            document.getElementById('role-performer').classList.toggle('active-role', role === 'performer');
            document.getElementById('role-performer').classList.toggle('bg-white', role === 'performer');
            document.getElementById('role-performer').classList.toggle('text-black', role === 'performer');
            document.getElementById('role-performer').classList.toggle('text-dash-secondary', role !== 'performer');
            
            document.getElementById('selected-role').value = role;
        }

        function handleSignup(e) {
            e.preventDefault();
            const role = document.getElementById('selected-role').value;
            window.location.href = `dashboard.html?view=${role === 'creator' ? 'creator' : 'performer'}`;
        }

        // Style for active role button
        const style = document.createElement('style');
        style.textContent = `
            .active-role { background-color: white !important; color: black !important; }
        `;
        document.head.append(style);

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
            updateLogo();
        }

        function updateLogo() {
            const logo = document.getElementById('logo-img');
            if (!logo) return;
            logo.src = document.body.classList.contains('light-mode') 
                ? 'assets/pidi.png' 
                : 'assets/pidiblack.png';
        }

        function updateThemeIcon() {
            const icon = document.querySelector('#theme-icon');
            if (document.body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        function handleLogout() {
            console.log("Clearing session and logging out...");
            window.location.href = 'index.html';
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            updateThemeIcon();
            updateLogo();
        }

        // Initialize
        selectRole('creator');
        updateLogo();
    </script>
</body>
</html>
