<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | PIDI Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root {
            --bg-body: #050505;
            --bg-card: #111111;
            --border-dash: #222222;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --nav-bg: #111111;
            --btn-secondary: #222222;
        }
        body.light-mode {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-dash: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --nav-bg: #edf2f7;
            --btn-secondary: #e2e8f0;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-primary); transition: background-color 0.3s ease, color 0.3s ease; max-width: 100vw; overflow-x: hidden; }
        .bento-card { background: var(--bg-card); border: 1px solid var(--border-dash); border-radius: 24px; padding: 2rem; transition: all 0.3s ease; }
        .accent-gradient { background: linear-gradient(135deg, #6a26da 0%, #a366ff 100%); color: white !important; }
        .text-dash-secondary { color: var(--text-secondary) !important; }
        .bg-dash-secondary { background-color: var(--btn-secondary); }
        .nav-container { background-color: var(--nav-bg); border: 1px solid var(--border-dash); }
        .active-role { background-color: white !important; color: black !important; }
        body.light-mode .active-role { background-color: #111111 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 gap-4">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <img id="logo-img" src="assets/pidiblack.png" alt="PIDI Logo" class="h-12 w-auto">
            <h1 class="text-2xl font-bold tracking-tight">PIDI Tasks</h1>
        </a>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-dash-secondary border border-dash flex items-center justify-center hover:border-[#6a26da] transition" id="theme-toggle">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-12 md:mt-24" id="signup-main">
        <div class="bento-card">
            <div id="signup-message" class="hidden p-3 rounded-xl text-sm mb-4 text-center"></div>
            <div class="mb-8">
                <h2 class="text-3xl font-bold tracking-tight">Create your account</h2>
                <p class="text-dash-secondary mt-2">Join the future of performance marketing.</p>
            </div>

            <form onsubmit="handleSignup(event)" class="space-y-5">
                <div>
                    <label for="signup-fullname" class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Full Name</label>
                    <input type="text" id="signup-fullname" placeholder="Prince Dike" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>
                
                <div>
                    <label for="signup-email" class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@company.com" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 text-sm focus:outline-none focus:border-[#6a26da] transition">
                </div>

                <div>
                    <label class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Primary Mode</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" onclick="selectRole('creator')" id="role-creator" class="p-3 rounded-xl border border-dash text-sm font-bold transition hover:border-[#6a26da] active-role">Creator</button>
                        <button type="button" onclick="selectRole('performer')" id="role-performer" class="p-3 rounded-xl border border-dash text-sm font-bold transition hover:border-[#6a26da] text-dash-secondary">Performer</button>
                    </div>
                    <input type="hidden" id="selected-role" value="creator">
                </div>

                <div>
                    <label for="signup-password" class="block text-[10px] uppercase font-bold text-dash-secondary tracking-widest mb-1.5 px-1">Password</label>
                    <div class="relative">
                        <input type="password" id="signup-password" placeholder="••••••••" required class="w-full bg-dash-secondary border border-dash rounded-xl p-3 pr-12 text-sm focus:outline-none focus:border-[#6a26da] transition">
                        <button type="button" onclick="togglePassword('signup-password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-dash-secondary hover:text-[#6a26da] transition focus:outline-none">
                            <i class="fa-solid fa-eye" id="toggle-icon-signup-password"></i>
                        </button>
                    </div>
                </div>


                <button type="submit" class="w-full accent-gradient py-4 rounded-2xl font-bold text-sm shadow-lg hover:scale-[1.02] transition active:scale-[0.98] mt-4">
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-dash text-center">
                <p class="text-sm text-dash-secondary">
                    Already have an account? 
                    <a href="login.html" class="text-[var(--text-primary)] font-bold hover:text-[#6a26da] transition ml-1">Log in here</a>
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // Helper function for displaying messages
        const displayAuthMessage = (elementId, message, type = 'info') => {
            const msgDiv = document.getElementById(elementId);
            if (!msgDiv) return;

            msgDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'bg-blue-100', 'text-blue-800');
            msgDiv.classList.add('p-3', 'rounded-xl', 'text-sm', 'mb-4', 'text-center'); // Ensure base styling

            if (type === 'success') {
                msgDiv.classList.add('bg-green-100', 'text-green-800');
            } else if (type === 'error') {
                msgDiv.classList.add('bg-red-100', 'text-red-800');
            } else { // info/loading
                msgDiv.classList.add('bg-blue-100', 'text-blue-800');
            }
            msgDiv.innerHTML = message;
            msgDiv.classList.remove('hidden');
        };

        const clearAuthMessage = (elementId) => {
            const msgDiv = document.getElementById(elementId);
            if (msgDiv) {
                msgDiv.classList.add('hidden');
                msgDiv.innerHTML = '';
            }
        };

        const setButtonLoading = (button, isLoading, originalText) => {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> ${originalText}`;
                button.dataset.originalText = originalText; // Store original text
            } else {
                button.disabled = false;
                button.innerHTML = button.dataset.originalText || originalText; // Restore original text
            }
        };

        const selectRole = (role) => {
            document.getElementById('role-creator').classList.toggle('active-role', role === 'creator');
            document.getElementById('role-creator').classList.toggle('text-dash-secondary', role !== 'creator');
            
            document.getElementById('role-performer').classList.toggle('active-role', role === 'performer');
            document.getElementById('role-performer').classList.toggle('text-dash-secondary', role !== 'performer');
            
            document.getElementById('selected-role').value = role; // Hidden input to store selected role
        }

        async function handleSignup(e) {
            e.preventDefault();
            clearAuthMessage('signup-message'); // Clear previous messages
            const fullName = document.getElementById('signup-fullname').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('selected-role').value;
            const submitButton = e.target.querySelector('button[type="submit"]');

            setButtonLoading(submitButton, true, 'Create Account');
            displayAuthMessage('signup-message', 'Creating account...', 'info');

            const { data, error } = await supabase.auth.signUp({
                email: email.trim(),
                password: password,
                options: {
                    data: {
                        full_name: fullName,
                        user_role: role // Store the selected role in user metadata
                    }
                }
            });

            setButtonLoading(submitButton, false, 'Create Account'); 

            if (error) {
                displayAuthMessage('signup-message', `Registration failed: ${error.message}. Please try again.`, 'error');
            } else {
                // Explicitly create the profile record in the profiles table
                if (data.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([
                            { 
                                id: data.user.id, 
                                full_name: fullName, 
                                email: email.trim(),
                                user_role: role,
                                balance: 0,
                                pending_balance: 0,
                                reputation_score: 80, // Default starting score
                                allocated_funds: 0
                            }
                        ]);
                    
                    if (profileError) console.error("Profile Creation Error:", profileError);
                }

                displayAuthMessage('signup-message', 'Account created! Please check your email to confirm, then return to log in.', 'success');
                // For immediate redirection (e.g., if email confirmation is off), use:
                // window.location.href = `dashboard.html?view=${role}`;
            }
        }

        // Theme toggle and logo update functions (kept for consistency with dashboard/login)
        const toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
            updateLogo();
            
            // Refresh active role state to respect light-mode styles (if theme changes after selection)
            const currentRole = document.getElementById('selected-role').value;
            selectRole(currentRole);
        }
        
        const updateLogo = () => {
            const logo = document.getElementById('logo-img');
            if (!logo) return;
            logo.src = document.body.classList.contains('light-mode') ? 'assets/pidi.png' : 'assets/pidiblack.png';
        }
        
        const updateThemeIcon = () => {
            const icon = document.querySelector('#theme-icon');
            icon.classList.toggle('fa-moon', !document.body.classList.contains('light-mode'));
            icon.classList.toggle('fa-sun', document.body.classList.contains('light-mode'));
        }

        const togglePassword = (id) => {
            const input = document.getElementById(id);
            const icon = document.getElementById('toggle-icon-' + id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            updateThemeIcon();
            updateLogo();
        }

        // Initialize role selection and expose functions to global scope
        selectRole('creator');
        window.selectRole = selectRole;
        window.handleSignup = handleSignup;
        window.toggleTheme = toggleTheme;
        window.togglePassword = togglePassword;
    </script>
</body>
</html>
